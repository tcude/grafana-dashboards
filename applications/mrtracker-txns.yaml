apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-mrtracker-txns
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
  annotations:
    grafana_folder: "Applications"
data:
  mrtracker-txns.json: |-
    {
      "annotations": {
        "list": []
      },
      "editable": true,
      "fiscalYearStartMonth": 0,
      "graphTooltip": 0,
      "id": null,
      "links": [],
      "panels": [
        {
          "type": "stat",
          "title": "Total Transactions",
          "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
          "datasource": { "type": "influxdb", "uid": "influxdb" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "blue", "value": null }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"mr-tracker\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"mr_transactions\")\n  |> filter(fn: (r) => r._field == \"points\")\n  |> group()\n  |> count()\n  |> yield(name: \"total_count\")",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Total Spend",
          "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
          "datasource": { "type": "influxdb", "uid": "influxdb" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "currencyUSD"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"mr-tracker\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"mr_transactions\")\n  |> filter(fn: (r) => r._field == \"amount_cents\")\n  |> group()\n  |> sum()\n  |> map(fn: (r) => ({r with _value: float(v: r._value) / 100.0}))\n  |> yield(name: \"total_spend\")",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Total Points Earned",
          "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
          "datasource": { "type": "influxdb", "uid": "influxdb" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"mr-tracker\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"mr_transactions\")\n  |> filter(fn: (r) => r._field == \"points\")\n  |> filter(fn: (r) => r.status != \"Pending\")\n  |> group()\n  |> sum()\n  |> yield(name: \"total_points\")",
              "refId": "A"
            }
          ]
        },
        {
          "type": "stat",
          "title": "Avg Pts/Transaction",
          "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
          "datasource": { "type": "influxdb", "uid": "influxdb" },
          "fieldConfig": {
            "defaults": {
              "color": { "mode": "thresholds" },
              "decimals": 0,
              "mappings": [],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null }
                ]
              },
              "unit": "short"
            },
            "overrides": []
          },
          "options": {
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center",
            "orientation": "auto",
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "showPercentChange": false,
            "textMode": "auto",
            "wideLayout": true
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"mr-tracker\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"mr_transactions\")\n  |> filter(fn: (r) => r._field == \"points\")\n  |> filter(fn: (r) => r.status != \"Pending\")\n  |> group()\n  |> mean()\n  |> yield(name: \"avg_points\")",
              "refId": "A"
            }
          ]
        },
        {
          "type": "table",
          "title": "Transactions",
          "gridPos": { "h": 20, "w": 24, "x": 0, "y": 4 },
          "datasource": { "type": "influxdb", "uid": "influxdb" },
          "fieldConfig": {
            "defaults": {
              "custom": {
                "filterable": true,
                "align": "auto",
                "cellOptions": { "type": "auto" }
              }
            },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "_time" },
                "properties": [
                  { "id": "displayName", "value": "Date" },
                  { "id": "custom.width", "value": 160 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "card_type" },
                "properties": [
                  { "id": "displayName", "value": "Card" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "cardholder" },
                "properties": [
                  { "id": "displayName", "value": "Cardholder" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "description" },
                "properties": [
                  { "id": "displayName", "value": "Description" },
                  { "id": "custom.width", "value": 300 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "multiplier" },
                "properties": [
                  { "id": "displayName", "value": "Multiplier" },
                  { "id": "custom.width", "value": 100 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "amount_dollars" },
                "properties": [
                  { "id": "displayName", "value": "Amount ($)" },
                  { "id": "unit", "value": "currencyUSD" },
                  { "id": "custom.width", "value": 120 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "points" },
                "properties": [
                  { "id": "displayName", "value": "Points" },
                  { "id": "custom.width", "value": 100 }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "status" },
                "properties": [
                  { "id": "displayName", "value": "Status" },
                  { "id": "custom.width", "value": 100 }
                ]
              }
            ]
          },
          "options": {
            "showHeader": true,
            "cellHeight": "sm",
            "sortBy": [{ "desc": true, "displayName": "_time" }]
          },
          "pluginVersion": "11.6.0",
          "targets": [
            {
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "from(bucket: \"mr-tracker\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"mr_transactions\")\n  |> pivot(rowKey: [\"_time\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> map(fn: (r) => ({r with amount_dollars: float(v: r.amount_cents) / 100.0}))\n  |> keep(columns: [\"_time\", \"card_type\", \"cardholder\", \"description\", \"multiplier\", \"amount_dollars\", \"points\", \"status\"])\n  |> sort(columns: [\"_time\"], desc: true)\n  |> yield(name: \"transactions\")",
              "refId": "A"
            }
          ]
        }
      ],
      "schemaVersion": 39,
      "tags": ["mrtracker"],
      "templating": {
        "list": []
      },
      "time": {
        "from": "now-6M",
        "to": "now"
      },
      "timepicker": {},
      "timezone": "browser",
      "title": "MR Tracker - Transaction Detail",
      "uid": "mrtracker-txns",
      "version": 1,
      "weekStart": ""
    }
