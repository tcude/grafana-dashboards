              "rawSql": "WITH ev AS (\n  SELECT s.started_at AS t, 1 AS d FROM sessions s WHERE s.started_at <= $__timeTo() AND coalesce(s.stopped_at, now()) >= $__timeFrom() AND ('${media_type}' = 'All' OR s.media_type = '${media_type}') AND ('${server}' = 'All' OR s.server_id = (SELECT id FROM servers WHERE name = '${server}'))\n  UNION ALL\n  SELECT coalesce(s.stopped_at, now()) AS t, -1 AS d FROM sessions s WHERE s.started_at <= $__timeTo() AND coalesce(s.stopped_at, now()) >= $__timeFrom() AND ('${media_type}' = 'All' OR s.media_type = '${media_type}') AND ('${server}' = 'All' OR s.server_id = (SELECT id FROM servers WHERE name = '${server}'))\n),\nrun AS (SELECT t, sum(d) OVER (ORDER BY t, d DESC) AS c FROM ev)\nSELECT coalesce(max(c),0) AS \"Peak\" FROM run WHERE t BETWEEN $__timeFrom() AND $__timeTo()",
