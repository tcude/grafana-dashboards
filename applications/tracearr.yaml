              "rawQuery": true,
              "rawSql": "SELECT su.username AS \"User\",\n       CASE WHEN s.media_type='episode' THEN s.grandparent_title || coalesce(' \u00b7 S'||lpad(s.season_number::text,2,'0')||'E'||lpad(s.episode_number::text,2,'0'),'') || coalesce(' \u00b7 '||nullif(s.media_title,''),'') WHEN s.media_type='live' THEN coalesce(s.channel_title, s.media_title, 'Live TV') ELSE coalesce(s.media_title,'Unknown') END AS \"Title\",\n       coalesce(s.player_name, s.product) AS \"Player\",\n       nullif(s.geo_city,'') AS \"Location\",\n       CASE WHEN s.is_transcode THEN 'Transcode' ELSE 'Direct Play' END AS \"Stream\",\n       round(100.0 * s.progress_ms / nullif(s.total_duration_ms,0)) AS \"Progress %\"\nFROM sessions s JOIN server_users su ON su.id = s.server_user_id\nWHERE s.stopped_at IS NULL AND s.last_seen_at > now() - interval '15 minutes' AND ('${server}' = 'All' OR s.server_id = (SELECT id FROM servers WHERE name = '${server}'))\nORDER BY s.started_at DESC",
