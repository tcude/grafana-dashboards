              "rawQuery": true,
              "rawSql": "WITH segs AS (\n  SELECT s.server_user_id, s.server_id, s.media_type, s.grandparent_title, s.media_title,\n         s.season_number, s.episode_number, s.channel_title,\n         coalesce(s.rating_key, s.channel_identifier, s.media_title) AS k,\n         s.started_at, s.stopped_at, s.duration_ms, s.progress_ms, s.total_duration_ms,\n         s.watched, s.is_transcode, coalesce(s.player_name, s.product) AS player, s.geo_city,\n         CASE WHEN lag(s.stopped_at) OVER w IS NULL\n                OR s.started_at - lag(s.stopped_at) OVER w > interval '3 hours'\n              THEN 1 ELSE 0 END AS isnew\n  FROM sessions s\n  WHERE $__timeFilter(s.started_at) AND ('${server}' = 'All' OR s.server_id = (SELECT id FROM servers WHERE name = '${server}')) AND ('${media_type}' = 'All' OR s.media_type = '${media_type}')\n  WINDOW w AS (PARTITION BY s.server_user_id,\n               coalesce(s.rating_key, s.channel_identifier, s.media_title) ORDER BY s.started_at)\n),\nisl AS (SELECT *, sum(isnew) OVER (PARTITION BY server_user_id, k ORDER BY started_at) AS island FROM segs),\nplays AS (\n  SELECT server_user_id, k, island, min(media_type) AS media_type,\n         min(grandparent_title) AS grandparent_title, min(media_title) AS media_title,\n         max(season_number) AS season_number, max(episode_number) AS episode_number,\n         min(channel_title) AS channel_title, min(started_at) AS play_start,\n         sum(duration_ms) AS play_ms, max(progress_ms) AS max_progress,\n         max(total_duration_ms) AS total_dur, bool_or(watched) AS watched,\n         bool_or(is_transcode) AS any_transcode,\n         (array_agg(player ORDER BY started_at DESC))[1] AS player,\n         (array_agg(geo_city ORDER BY started_at DESC))[1] AS geo_city\n  FROM isl GROUP BY server_user_id, k, island HAVING sum(duration_ms) >= 120000\n)\nSELECT round(100.0 * count(*) FILTER (WHERE watched) / nullif(count(*),0), 1) AS \"Completed\" FROM plays",
