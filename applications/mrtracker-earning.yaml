            {
              "datasource": { "type": "influxdb", "uid": "influxdb" },
              "query": "points = from(bucket: \"mr-tracker\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"mr_transactions\")\n  |> filter(fn: (r) => r._field == \"points\")\n  |> filter(fn: (r) => r.status != \"Pending\")\n  |> group()\n  |> aggregateWindow(every: 1mo, fn: sum, createEmpty: false)\n  |> set(key: \"_field\", value: \"points\")\n\ncents = from(bucket: \"mr-tracker\")\n  |> range(start: v.timeRangeStart, stop: v.timeRangeStop)\n  |> filter(fn: (r) => r._measurement == \"mr_transactions\")\n  |> filter(fn: (r) => r._field == \"amount_cents\")\n  |> filter(fn: (r) => r.status != \"Pending\")\n  |> group()\n  |> aggregateWindow(every: 1mo, fn: sum, createEmpty: false)\n  |> set(key: \"_field\", value: \"amount_cents\")\n\nunion(tables: [points, cents])\n  |> pivot(rowKey: [\"_time\"], columnKey: [\"_field\"], valueColumn: \"_value\")\n  |> filter(fn: (r) => r.amount_cents > 0)\n  |> map(fn: (r) => ({r with _value: float(v: r.points) / (float(v: r.amount_cents) / 100.0)}))\n  |> yield(name: \"monthly_ppd\")",
