vector(0)) * 0.2 + (sum(increase(claude_code_token_usage_tokens_total{model=\"claude-sonnet-5\",type=\"output\"}[$__range])) or vector(0)) * 10) / 1000000 + ((sum(increase(claude_code_token_usage_tokens_total{model=\"claude-sonnet-4-6\",type=\"input\"}[$__range])) or vector(0)) * 3 + (sum(increase(claude_code_token_usage_tokens_total{model=\"claude-sonnet-4-6\",type=\"cacheCreation\"}[$__range])) or vector(0)) * 3.75 + (sum(increase(claude_code_token_usage_tokens_total{model=\"claude-sonnet-4-6\",type=\"cacheRead\"}[$__range])) or vector(0)) * 0.3 + (sum(increase(claude_code_token_usage_tokens_total{model=\"claude-sonnet-4-6\",type=\"output\"}[$__range])) or vector(0)) * 15) / 1000000 + ((sum(increase(claude_code_token_usage_tokens_total{model=\"claude-haiku-4-5-20251001\",type=\"input\"}[$__range])) or vector(0)) * 1 + (sum(increase(claude_code_token_usage_tokens_total{model=\"claude-haiku-4-5-20251001\",type=\"cacheCreation\"}[$__range])) or vector(0)) * 1.25 + (sum(increase(claude_code_token_usage_tokens_total{model=\"claude-haiku-4-5-20251001\",type=\"cacheRead\"}[$__range])) or vector(0)) * 0.1 + (sum(increase(claude_code_token_usage_tokens_total{model=\"claude-haiku-4-5-20251001\",type=\"output\"}[$__range])) or vector(0)) * 5) / 1000000)",
