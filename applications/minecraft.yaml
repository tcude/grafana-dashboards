      "fiscalYearStartMonth": 0,
      "graphTooltip": 1,
      "id": null,
      "links": [],
      "liveNow": false,
      "panels": [
        {
          "id": 1,
          "type": "row",
          "title": "Overview",
          "collapsed": false,
          "gridPos": {
            "x": 0,
            "y": 0,
            "w": 24,
            "h": 1
          },
          "panels": []
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Server",
          "datasource": {
            "type": "prometheus",
            "uid": "${datasource}"
          },
          "gridPos": {
            "x": 0,
            "y": 1,
            "w": 4,
            "h": 4
          },
          "fieldConfig": {
            "defaults": {
              "color": {
                "mode": "thresholds"
              },
              "mappings": [
                {
                  "type": "value",
                  "options": {
                    "0": {
                      "text": "DOWN",
                      "index": 1
                    },
                    "1": {
                      "text": "UP",
                      "index": 0
                    }
                  }
                }
              ],
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {
                    "color": "red",
                    "value": null
                  },
                  {
                    "color": "green",
                    "value": 1
                  }
                ]
              }
            },
            "overrides": []
          },
          "options": {
            "reduceOptions": {
              "calcs": [
                "lastNotNull"
              ],
              "fields": "",
              "values": false
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "up{job=\"minecraft-exporter\", server=~\"$server\"}",
              "datasource": {
                "type": "prometheus",
                "uid": "${datasource}"
